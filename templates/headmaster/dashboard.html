<!DOCTYPE html>
<html>
<head>
    <title>Headmaster Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="col-md-2 bg-dark text-white vh-100 p-3">
    <div class="text-center">
        <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6c3ce0,#9b59b6);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:28px;font-weight:700;color:white;box-shadow:0 5px 20px rgba(108,60,224,0.3);">
            H
        </div>
        <h4>HINAYA</h4>
    </div>
    <hr>
                <a href="/headmaster/" class="text-white d-block py-2">Dashboard</a>
                <a href="/headmaster/students/" class="text-white d-block py-2">Students</a>
                <a href="/headmaster/teachers/" class="text-white d-block py-2">Teachers</a>
                <a href="/headmaster/buses/" class="text-white d-block py-2">Buses</a>
                <hr>
                <a href="/logout/" class="text-white d-block py-2">Logout</a>
            </div>
            <div class="col-md-10 p-4">
                <h2>Headmaster Dashboard</h2>
                <p>Welcome, {{ user.first_name }}</p>
                
                <div class="row mt-4">
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>{{ total_students }}</h3>
                                <p>Total Students</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>{{ total_teachers }}</h3>
                                <p>Total Teachers</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>{{ total_classes }}</h3>
                                <p>Total Classes</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <h3>{{ total_buses }}</h3>
                                <p>Total Buses</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
